[build]
  base    = "."
  command = "rm -rf node_modules package-lock.json && npm install && npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"

# Serve the early-access APK as a proper Android package download
[[headers]]
  for = "/downloads/*.apk"
  [headers.values]
    Content-Type = "application/vnd.android.package-archive"
    Content-Disposition = "attachment; filename=\"chooze.apk\""
    Cache-Control = "public, max-age=300"
