<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="violet-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="pink-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="50%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="bg-c" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1E1535"/>
      <stop offset="100%" stop-color="#0A0614"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg-c)"/>
  <!-- Two abstract companion shapes leaning toward each other -->
  <!-- Left shape — violet -->
  <ellipse cx="380" cy="480" rx="140" ry="200" transform="rotate(12, 380, 480)"
           fill="url(#violet-c)" opacity="0.8"/>
  <!-- Right shape — pink -->
  <ellipse cx="644" cy="480" rx="140" ry="200" transform="rotate(-12, 644, 480)"
           fill="url(#pink-c)" opacity="0.65"/>
  <!-- Connection point — where they meet -->
  <circle cx="512" cy="460" r="40" fill="#F5F3FF" opacity="0.3"/>
  <circle cx="512" cy="460" r="16" fill="#F5F3FF" opacity="0.8"/>
</svg>
