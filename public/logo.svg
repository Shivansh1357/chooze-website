<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0A0614"/>
  <!-- Subtle glow ring -->
  <circle cx="256" cy="240" r="140" fill="url(#glow)"/>
  <!-- Stylized "C" from two arcs — represents choice/duality -->
  <path d="M310 140 C220 130, 140 180, 140 256 C140 332, 220 382, 310 372"
        stroke="#8B5CF6" stroke-width="36" stroke-linecap="round" fill="none"/>
  <path d="M300 156 C225 150, 158 195, 158 256 C158 317, 225 362, 300 356"
        stroke="#EC4899" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Small sparkle dot — accent -->
  <circle cx="325" cy="152" r="14" fill="url(#brand)"/>
  <circle cx="325" cy="152" r="6" fill="#F5F3FF"/>
  <!-- Wordmark below -->
  <text x="256" y="450" text-anchor="middle" font-family="'Poppins', sans-serif" font-weight="700" font-size="72" fill="url(#brand)">chooze</text>
</svg>
