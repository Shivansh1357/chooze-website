<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1E1535"/>
      <stop offset="100%" stop-color="#0A0614"/>
    </radialGradient>
  </defs>
  <!-- Background with subtle radial glow -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg-glow)"/>
  <!-- Ambient glow -->
  <circle cx="512" cy="470" r="280" fill="url(#glow)"/>
  <!-- Primary "C" arc — violet -->
  <path d="M620 260 C440 240, 270 340, 270 512 C270 684, 440 784, 620 764"
        stroke="#8B5CF6" stroke-width="72" stroke-linecap="round" fill="none"/>
  <!-- Secondary "C" arc — pink overlay -->
  <path d="M600 290 C445 275, 305 370, 305 512 C305 654, 445 749, 600 734"
        stroke="#EC4899" stroke-width="40" stroke-linecap="round" fill="none" opacity="0.55"/>
  <!-- Sparkle accent -->
  <circle cx="648" cy="278" r="28" fill="url(#brand)"/>
  <circle cx="648" cy="278" r="12" fill="#F5F3FF"/>
  <!-- Second small sparkle -->
  <circle cx="648" cy="746" r="18" fill="url(#brand)" opacity="0.5"/>
  <circle cx="648" cy="746" r="7" fill="#F5F3FF" opacity="0.7"/>
</svg>
